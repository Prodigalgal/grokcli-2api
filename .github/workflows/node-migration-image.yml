name: Build Node service image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "node/**"
      - "grok2api/**"
      - "grok-build-auth/**"
      - "scripts/**"
      - "turnstile-solver/**"
      - "requirements.txt"
      - ".github/workflows/node-migration-image.yml"
      - ".dockerignore"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "node/**"
      - "grok2api/**"
      - "grok-build-auth/**"
      - "scripts/**"
      - "turnstile-solver/**"
      - "requirements.txt"
      - ".github/workflows/node-migration-image.yml"
      - ".dockerignore"
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push the validated node-edge image to GHCR"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: node-service-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm
          cache-dependency-path: node/package-lock.json
      - run: npm ci
      - run: npm test

  image:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push_image)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=node-edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=node-sha-,format=long
            type=ref,event=pr,prefix=node-pr-
      - id: migration-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=node-migration-edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=node-migration-sha-,format=long
            type=ref,event=pr,prefix=node-migration-pr-
      - id: registration-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=registration-edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=registration-sha-,format=long
            type=ref,event=pr,prefix=registration-pr-
      - name: Build and optionally push Node service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: node/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push_image) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and optionally push PostgreSQL export image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: node/Dockerfile
          target: migration
          platforms: linux/amd64,linux/arm64
          push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push_image) }}
          tags: ${{ steps.migration-meta.outputs.tags }}
          labels: ${{ steps.migration-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and optionally push registration worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: registration-worker
          platforms: linux/amd64,linux/arm64
          push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push_image) }}
          tags: ${{ steps.registration-meta.outputs.tags }}
          labels: ${{ steps.registration-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
