services:
  grok2api:
    build:
      context: .
      dockerfile: node/Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GROK2API_HOST: 0.0.0.0
      GROK2API_PORT: 40081
      GROK2API_DATA_DIR: /app/data-node
      GROK2API_SQLITE_PATH: /app/data-node/app.sqlite
      GROK2API_XAI_UPSTREAM_BASE_URL: ${GROK2API_XAI_UPSTREAM_BASE_URL:-https://cli-chat-proxy.grok.com/v1}
      GROK2API_ADMIN_USERNAME: ${GROK2API_ADMIN_USERNAME:-admin}
      GROK2API_ADMIN_PASSWORD: ${GROK2API_ADMIN_PASSWORD:-nj@363600}
      GROK2API_API_KEY: ${GROK2API_API_KEY:-}
      GROK2API_REQUIRE_API_KEY: ${GROK2API_REQUIRE_API_KEY:-auto}
      GROK2API_CFMAIL_BASE_URL: ${GROK2API_CFMAIL_BASE_URL:-}
      GROK2API_CFMAIL_API_KEY: ${GROK2API_CFMAIL_API_KEY:-}
      GROK2API_CFMAIL_DOMAIN: ${GROK2API_CFMAIL_DOMAIN:-}
      GROK2API_REGISTRATION_SERVICE_URL: ${GROK2API_REGISTRATION_SERVICE_URL:-}
      GROK2API_REGISTRATION_TOKEN: ${GROK2API_REGISTRATION_TOKEN:-}
    ports:
      - "${GROK2API_PORT:-40081}:40081"
    volumes:
      - grok2api_node_data:/app/data-node

volumes:
  grok2api_node_data:
