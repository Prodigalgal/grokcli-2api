<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1180">
    <meta name="color-scheme" content="light">
    <title>grok2api</title>
    <link rel="stylesheet" href="/admin/app.css?v=20260724">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">grok2api <span>NODE</span></div>
        <div class="top-actions">
          <span id="connection-state" class="state">未连接</span>
          <button id="refresh-button" type="button">刷新</button>
          <button id="logout-button" type="button" class="quiet">退出</button>
        </div>
      </header>

      <section id="login-view" class="login-view">
        <form id="login-form" class="login-form">
          <label>管理员账号<input id="admin-username" type="text" autocomplete="username" required></label>
          <label>管理密码<input id="admin-password" type="password" autocomplete="current-password" required></label>
          <button type="submit">进入管理台</button>
          <p id="login-error" class="form-error" hidden></p>
        </form>
      </section>

      <section id="app-view" hidden>
        <nav class="tabs" aria-label="管理模块">
          <button type="button" data-tab="overview" class="active">概览</button>
          <button type="button" data-tab="accounts">账号</button>
          <button type="button" data-tab="keys">密钥</button>
          <button type="button" data-tab="models">模型</button>
          <button type="button" data-tab="tasks">注册机</button>
          <button type="button" data-tab="keepalive">保活</button>
          <button type="button" data-tab="usage">用量</button>
          <button type="button" data-tab="logs">日志</button>
          <button type="button" data-tab="settings">设置</button>
        </nav>

        <section id="overview-panel" data-panel="overview" class="panel active">
          <div id="overview-grid" class="metrics"></div>
          <div class="split-grid">
            <section class="tool-surface"><h2>账号池</h2><div id="pool-summary" class="summary-list"></div></section>
            <section class="tool-surface"><h2>用量</h2><div id="usage-summary" class="summary-list"></div></section>
          </div>
        </section>

        <section data-panel="accounts" class="panel">
          <div class="toolbar">
            <button id="account-import" type="button">导入 JSON</button>
            <button id="account-export" type="button" class="quiet">导出账号</button>
            <button id="maintainer-run" type="button" class="quiet">立即续期</button>
            <label class="search">筛选账号<input id="account-query" type="search" placeholder="账号 ID、邮箱或用户 ID"></label>
            <select id="account-status"><option value="">全部状态</option><option value="active">可用</option><option value="disabled">已停用</option><option value="quota_disabled">额度停用</option><option value="cooldown">冷却中</option><option value="expired">已过期</option></select>
            <button id="account-search" type="button">查询</button>
          </div>
          <div class="table-wrap"><table><thead><tr><th>账号</th><th>状态</th><th>权重</th><th>请求</th><th>过期</th><th></th></tr></thead><tbody id="accounts-body"></tbody></table></div>
          <div id="account-pagination" class="pagination"></div>
        </section>

        <section data-panel="keys" class="panel">
          <div class="toolbar"><button id="key-create" type="button">创建密钥</button></div>
          <div class="table-wrap"><table><thead><tr><th>名称</th><th>密钥</th><th>状态</th><th>请求</th><th>Token</th><th></th></tr></thead><tbody id="keys-body"></tbody></table></div>
        </section>


        <section data-panel="tasks" class="panel">
          <div class="workbench-head">
            <div><h1>批量注册</h1><p>使用服务器配置的 CF Temp Mail 与独立代理池创建账号。</p></div>
            <div class="toolbar"><button id="registration-save" type="button" class="quiet">保存设置</button><button id="registration-start" type="button">启动批量注册</button><button id="registration-stop" type="button" class="danger">停止任务</button></div>
          </div>
          <div id="registration-metrics" class="metrics"></div>
            <section class="tool-surface registration-settings"><h2>注册设置</h2><div class="form-grid"><label>成功目标<input id="registration-count" type="number" min="1" max="20" value="1"></label><label>执行并发<input value="1" disabled></label><label>邮箱域名<input id="registration-domain" readonly></label><label>网络出口<input value="节点直连" readonly></label></div></section>
          <div class="table-wrap"><table><thead><tr><th>类型</th><th>状态</th><th>尝试</th><th>更新时间</th><th>日志</th><th></th></tr></thead><tbody id="tasks-body"></tbody></table></div>
        </section>

        <section data-panel="keepalive" class="panel">
          <div class="workbench-head"><div><h1>账号保活</h1><p>自动刷新有效凭据；失效账号进入重授权队列，明确封禁后才停止。</p></div><div class="toolbar"><button id="keepalive-run" type="button" class="quiet">立即扫描</button><button id="keepalive-enable-all" type="button">全部启用并重授权</button></div></div>
          <div id="keepalive-metrics" class="metrics"></div>
          <div class="split-grid"><section class="tool-surface"><h2>运行策略</h2><div class="summary-list"><div><span>自动保活</span><strong>运行中</strong></div><div><span>邮箱取信</span><strong>实时恢复</strong></div><div><span>停止条件</span><strong>明确封禁</strong></div></div></section><section class="tool-surface"><h2>重授权队列</h2><div id="reauth-summary" class="summary-list"></div></section></div>
        </section>

        <section data-panel="models" class="panel">
          <div class="toolbar"><button id="models-sync" type="button">同步模型</button></div>
          <div class="table-wrap"><table><thead><tr><th>模型 ID</th><th>名称</th><th>所有者</th><th>上下文</th><th>推理强度</th></tr></thead><tbody id="models-body"></tbody></table></div>
        </section>

        <section data-panel="usage" class="panel">
          <div id="usage-metrics" class="metrics"></div>
          <div class="split-grid">
            <section class="tool-surface"><h2>近 14 天</h2><div id="usage-series" class="table-wrap"></div></section>
            <section class="tool-surface"><h2>按模型</h2><div id="usage-models" class="table-wrap"></div></section>
          </div>
        </section>

        <section data-panel="logs" class="panel">
          <div class="toolbar"><button id="logs-refresh" type="button">刷新日志</button></div>
          <div class="table-wrap"><table><thead><tr><th>时间</th><th>类型</th><th>状态</th><th>详情</th></tr></thead><tbody id="logs-body"></tbody></table></div>
        </section>

        <section data-panel="settings" class="panel">
          <form id="settings-form" class="settings-form">
            <section class="tool-surface"><h2>运行设置</h2><label>默认模型<input id="setting-default-model" name="default_model" placeholder="grok-4.5"></label><label>账号调度<select id="setting-account-mode" name="account_mode"><option value="round_robin">轮询</option><option value="least_used">最少使用</option><option value="random">随机</option></select></label><button type="submit">保存设置</button></section>
          </form>
        </section>
      </section>
    </main>

    <dialog id="form-dialog">
      <form id="dialog-form" method="dialog">
        <header><h2 id="dialog-title"></h2><button type="button" id="dialog-close" class="quiet">关闭</button></header>
        <div id="dialog-fields" class="dialog-fields"></div>
        <p id="dialog-error" class="form-error" hidden></p>
        <footer><button id="dialog-submit" type="submit">确认</button></footer>
      </form>
    </dialog>
    <dialog id="secret-dialog"><form method="dialog"><header><h2>新 API Key</h2><button type="submit" class="quiet">关闭</button></header><code id="issued-secret"></code><footer><button id="copy-secret" type="button">复制</button></footer></form></dialog>
    <script type="module" src="/admin/app.js?v=20260724"></script>
  </body>
</html>
