apiVersion: batch/v1
kind: Job
metadata:
  name: grok2api-node-export
  labels:
    app.kubernetes.io/name: grok2api
    app.kubernetes.io/component: node-migration
spec:
  suspend: true
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grok2api
        app.kubernetes.io/component: node-migration
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      nodeSelector:
        infra.mnnu/node-class: core-public
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: exporter
          image: ghcr.io/prodigalgal/grokcli-2api:node-migration-edge
          args:
            - build/src/cli/export-legacy-postgres-snapshot.js
            - /app/data-node/migration/snapshot.json
          env:
            - name: GROK2API_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: grok2api-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: node-data
              mountPath: /app/data-node
      volumes:
        - name: node-data
          persistentVolumeClaim:
            claimName: grok2api-node-data
